<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DERN Safety Map</title>

    <link rel="stylesheet" href="/css/style.css" />

    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />
</head>
<body>
<header>
    <h1>DERN Safety Map</h1>
    <nav>
        <a href="/index.html">Map</a>
        <a href="/report.html">Report</a>
        <a href="/dashboard.html">Dashboard</a>
    </nav>
</header>
<button id="menuToggleBtn" class="hamburger-btn">☰</button>

<div id="sideMenu" class="side-menu hidden-menu">
    <h3>Menu</h3>

    <button id="toggleMarkersBtn">Hide Markers</button>
    <button id="toggleHeatmapBtn">Hide Heatmap</button>
    <button id="logoutBtn">Logout</button>

    <hr />

    <a href="tel:100">Police</a>
    <a href="tel:108">Ambulance</a>
    <a href="tel:101">Fire Force</a>
</div>

<main>
    <div id="alertBox" class="alert-hidden"></div>



    <div id="legendBox">
        <h4>Legend</h4>
        <div><span class="legend-dot red"></span> Pothole / Crash</div>
        <div><span class="legend-dot orange"></span> Unsafe Area / Open Canal</div>
        <div><span class="legend-dot yellow"></span> Violation</div>
        <div><span class="legend-dot blue"></span> Your Location / Default</div>
    </div>

    <div id="map"></div>



    <button id="sosButton" class="sos-off">SOS</button>

</main>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
